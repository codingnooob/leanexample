name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4        # line 21: update from v5 to v4
      - uses: leanprover/lean-action@v1  # line 22: verify this is the latest
      - uses: leanprover-community/docgen-action@v1  # line 23: verify this is the latest
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      - uses: actions/deploy-pages@v4    # line 27: update from v2 to v4
        id: deployment